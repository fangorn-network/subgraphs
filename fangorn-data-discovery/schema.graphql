type ManifestPublished @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  manifestCid: String! # String
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ManifestUpdated @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  manifestCid: String! # String
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SchemaRegistered @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  ipfsCid: String!
  agentId: String!
}

type ResourceCreated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  groupId: BigInt!
  owner: Bytes!
  price: BigInt!
}

type PriceUpdated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  owner: Bytes!
  price: BigInt!
}

type SchemaUpdated @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  newIpfsCid: String!
  newAgentId: String!
}

type SchemaState @entity(immutable: true) {
  id: ID!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  versions: [Schema!]
}

type Schema @entity(immutable: true) {
  id: ID!
  version: BigInt
  agentId: String
  fields: [SchemaField!]
}

type SchemaField @entity(immutable: true) {
  id: ID!
  name: String!
  fieldType: String!
}

type ManifestState @entity(immutable: false) {
  id: Bytes!
  owner: Bytes!
  schemaId: Bytes!
  schema: SchemaState
  schemaName: String!
  manifestCid: String!
  manifest: Manifest
  version: BigInt!
  lastUpdated: BigInt!
}

type Manifest @entity(immutable: false) {
  id: ID!
  manifestVersion: BigInt
  schemaId: String
  files: [File!]
}

type File @entity(immutable: false) {
  id: ID!
  tag: String
  manifest: Manifest
  fields: [FileField!]
}

type FileField @entity(immutable: false) {
  id: ID!
  name: String
  value: String
  atType: String
  acc: String
  manifestState: ManifestState!
  parentFile: File
  pricing: PricingResource
}

type PricingResource @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  price: BigInt!
  currency: String!
}