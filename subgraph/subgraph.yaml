specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DatasourceContract
    network: arbitrum-sepolia
    source:
      address: "0x14cff4b583cabde7066d12f04bf9eaba408a426f"
      abi: DatasourceContract
      startBlock: 262295523
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ManifestPublished
        - ManifestUpdated
      abis:
        - name: DatasourceContract
          file: ./abis/DatasourceContract.json
      eventHandlers:
        - event: ManifestPublished(indexed address,indexed bytes32,indexed bytes32,string,string)
          handler: handleManifestPublished
        - event: ManifestUpdated(indexed address,indexed bytes32,indexed bytes32,string,uint64)
          handler: handleManifestUpdated
      file: ./src/datasource-contract.ts
  - kind: ethereum
    name: SchemaContract
    network: arbitrum-sepolia
    source:
      address: "0xfe63c0748cc992c7258dc3c92b44247f44f88577"
      abi: SchemaContract
      startBlock: 262295523
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SchemaRegistered
        - SchemaUpdated
      abis:
        - name: SchemaContract
          file: ./abis/SchemaContract.json
      eventHandlers:
        - event: SchemaRegistered(indexed bytes32,indexed address,string,string,string)
          handler: handleSchemaRegistered
        - event: SchemaUpdated(indexed bytes32,string,string)
          handler: handleSchemaUpdated
      file: ./src/schema-contract.ts
  - kind: ethereum
    name: SettlementContract
    network: arbitrum-sepolia
    source:
      address: "0x282915f5c6f6c9b15c131fa379916da47754fbef"
      abi: SettlementContract
      startBlock: 262295523
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ResourceCreated
        - PriceUpdated
      abis:
        - name: SettlementContract
          file: ./abis/SettlementContract.json
      eventHandlers:
        - event: ResourceCreated(indexed bytes32,uint256,address,uint256)
          handler: handleResourceCreated
        - event: PriceUpdated(indexed bytes32,address,uint256)
          handler: handlePriceUpdated
      file: ./src/settlement-contract.ts