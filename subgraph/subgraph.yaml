specVersion: 1.3.0
indexerHints:
  prune: auto
features:
  - ipfsOnEthereumContracts
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DatasourceContract
    network: arbitrum-sepolia
    source:
      address: "0xe8a5906825680a5816a7f28f2a0fa2d9ceec3755"
      abi: DatasourceContract
      startBlock: 262022757
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ManifestPublished
        - ManifestUpdated
      abis:
        - name: DatasourceContract
          file: ./abis/DatasourceContract.json
      eventHandlers:
        - event: ManifestPublished(indexed address,indexed bytes32,indexed bytes32,string,string)
          handler: handleManifestPublished
        - event: ManifestUpdated(indexed address,indexed bytes32,indexed bytes32,string,uint64)
          handler: handleManifestUpdated
      file: ./src/datasource-contract.ts
  - kind: ethereum
    name: SchemaContract
    network: arbitrum-sepolia
    source:
      address: "0x267084865813550d9d97d3842c4a2d33a872908f"
      abi: SchemaContract
      startBlock: 262022757
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - SchemaRegistered
        - SchemaUpdated
      abis:
        - name: SchemaContract
          file: ./abis/SchemaContract.json
      eventHandlers:
        - event: SchemaRegistered(indexed bytes32,indexed address,string,string,string)
          handler: handleSchemaRegistered
        - event: SchemaUpdated(indexed bytes32,string,string)
          handler: handleSchemaUpdated
      file: ./src/schema-contract.ts
  - kind: ethereum
    name: SettlementContract
    network: arbitrum-sepolia
    source:
      address: "0x1d21545f536a2f026348477960ca59f9f1d7fabd"
      abi: SettlementContract
      startBlock: 262022757 
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ResourceCreated
        - PriceUpdated
      abis:
        - name: SettlementContract
          file: ./abis/SettlementContract.json
      eventHandlers:
        - event: ResourceCreated(indexed bytes32,uint256,address,uint256)
          handler: handleResourceCreated
        - event: PriceUpdated(indexed bytes32,address,uint256)
          handler: handlePriceUpdated
      file: ./src/settlement-contract.ts
templates:
  - name: Manifest
    kind: file/ipfs
    mapping:
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/datasource-contract.ts
      handler: handleMetadata
      entities:
        - ManifestState
        - Manifest
        - File
        - FileField
      abis:
        - name: Dummy
          file: ./abis/Dummy.json
  - name: Schema
    kind: file/ipfs
    mapping:
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/schema-contract.ts
      handler: handleSchema
      entities:
        - Schema
        - SchemaField
      abis:
        - name: Dummy
          file: ./abis/Dummy.json