type ManifestPublished @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  manifestCid: String! # String
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ManifestUpdated @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  manifestCid: String! # String
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SchemaRegistered @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  ipfsCid: String!
  agentId: String!
}

type SchemaUpdated @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  newIpfsCid: String!
  newAgentId: String!
}

type ResourceCreated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  groupId: BigInt!
  owner: Bytes!
  price: BigInt!
}

type PriceUpdated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  owner: Bytes!
  price: BigInt!
}

type SchemaState @entity(immutable: false) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  versions: [Schema!]
}

type Schema @entity(immutable: false) {
  id: ID!
  manifestStates: [ManifestState!] @derivedFrom(field: "schema")
  version: String
  agentId: String
  fields: [SchemaField!]
}

type SchemaField @entity(immutable: false) {
  id: ID!
  name: String!
  fieldType: String!
}

type ManifestState @entity(immutable: false) {
  id: Bytes!
	schemaId: Bytes!
  schemaName: String!
  owner: Bytes!
  schema: Schema
  manifestCid: String!
  manifest: Manifest
  version: BigInt!
  lastUpdated: BigInt!
}

type Manifest @entity(immutable: false) {
  id: ID!
	schemaId: Bytes!
  schemaName: String!
	manifestStateId: Bytes!
  manifestVersion: BigInt
  manifestState: ManifestState!
  files: [File!] @derivedFrom(field: "manifest")
}

type File @entity(immutable: false) {
  id: ID!
	schemaId: Bytes!
  schemaName: String!
	manifestStateId: Bytes!
	manifest: Manifest!
  name: String
  fileFields: [FileField!] @derivedFrom(field: "file")
}

type FileField @entity(immutable: false) {
  id: ID!
	schemaId: Bytes!
  schemaName: String!
	manifestStateId: Bytes!
  name: String
  value: String
  atType: String
  acc: String
	fileId: String!
  file: File!
  pricing: PricingResource
}

type PricingResource @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  price: BigInt!
  currency: String!
}