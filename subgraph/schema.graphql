type ManifestPublished @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  schemaId: Bytes!
  nameHash: Bytes!
  name: String!
  manifestCid: String!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ManifestUpdated @entity(immutable: true) {
  id: Bytes!
  owner: Bytes!
  schemaId: Bytes!
  nameHash: Bytes!
  manifestCid: String!
  version: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SchemaRegistered @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  ipfsCid: String!
  agentId: String!
}

type SchemaUpdated @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  newIpfsCid: String!
  newAgentId: String!
}

type ResourceCreated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  groupId: BigInt!
  owner: Bytes!
  price: BigInt!
}

type PriceUpdated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  owner: Bytes!
  price: BigInt!
}

type PricingResource @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  price: BigInt!
  currency: String!
}