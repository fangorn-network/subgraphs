type ManifestPublished @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  nameHash: Bytes! # bytes32
  name: String! # string
  manifestCid: String! # string
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type ManifestUpdated @entity(immutable: true) {
  id: Bytes!
  owner: Bytes! # address
  schemaId: Bytes! # bytes32
  nameHash: Bytes! # bytes32
  manifestCid: String! # string
  version: BigInt! # uint64
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type SchemaRegistered @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  ipfsCid: String!
  agentId: String!
}

type SchemaUpdated @entity(immutable: true) {
  id: Bytes!
  schemaId: Bytes!
  newIpfsCid: String!
  newAgentId: String!
}

type ResourceCreated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  groupId: BigInt!
  owner: Bytes!
  price: BigInt!
}

type PriceUpdated @entity(immutable: true) {
  id: Bytes!
  resourceId: Bytes!
  owner: Bytes!
  price: BigInt!
}

type SchemaState @entity(immutable: false) {
  id: Bytes!
  schemaId: Bytes!
  owner: Bytes!
  name: String!
  versions: [Schema!]
}

type Schema @entity(immutable: false) {
  id: ID!
  manifestStates: [ManifestState!] @derivedFrom(field: "schema")
  version: String
  root: SchemaNode!
  traversalString: String!
}

type SchemaNode @entity(immutable: false) {
  id: ID!
  key: String!
  isList: Boolean!
  childNodes: [SchemaNode!]
  childLeaves: [SchemaLeaf!]
}

type SchemaLeaf @entity(immutable: false) {
  id: ID!
  key: String!
  valueType: SchemaValueType!
  isList: Boolean!
}

enum SchemaValueType {
  STRING
  NUMBER
  DECIMAL
  BOOL
  ADDRESS
  BYTES
}

type ManifestState @entity(immutable: false) {
  id: Bytes!
	schemaId: Bytes!
  schemaName: String!
  owner: Bytes!
  schema: Schema
  manifestCid: String!
  manifest: Manifest
  version: BigInt!
  lastUpdated: BigInt!
}

type Manifest @entity(immutable: false) {
  id: ID!
	schemaId: Bytes!
  schemaName: String!
	manifestStateId: Bytes!
  manifestVersion: BigInt
  manifestState: ManifestState!
  root: ManifestNode!
}

type ManifestNode @entity(immutable: false) {
  id: ID!
  manifest: Manifest!
  name: String!
  type: String!  # "object" or "array"
  childNodes: [ManifestNode!] @derivedFrom(field: "parentNode")
  childLeaves: [ManifestLeaf!] @derivedFrom(field: "parentNode")
  parentNode: ManifestNode
}

type ManifestLeaf @entity(immutable: false) {
  id: ID!
  manifest: Manifest!
  parentNode: ManifestNode!
  name: String!
  type: String!
  value: String!
}

type PricingResource @entity(immutable: false) {
  id: ID!
  owner: Bytes!
  price: BigInt!
  currency: String!
}