specVersion: 1.3.0
indexerHints:
  prune: auto
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: DatasourceContract
    network: arbitrum-sepolia
    source:
      address: "0x3dfd4393577222f8fd89e75d59bbe9c19be03bec"
      abi: DatasourceContract
      startBlock: 253504276
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      entities:
        - ManifestPublished
        - ManifestUpdated
      abis:
        - name: DatasourceContract
          file: ./abis/DatasourceContract.json
      eventHandlers:
        - event: ManifestPublished(indexed address,indexed bytes32,string,uint64)
          handler: handleManifestPublished
        - event: ManifestUpdated(indexed address,indexed bytes32,string,uint64)
          handler: handleManifestUpdated
      file: ./src/datasource-contract.ts
templates:
  - name: FileMetadata
    kind: file/ipfs
    mapping:
      apiVersion: 0.0.9
      language: wasm/assemblyscript
      file: ./src/datasource-contract.ts
      handler: handleMetadata
      entities:
        - FileMetadata
        - FileEntry
      abis:
        - name: File
          file: ./abis/File.json
