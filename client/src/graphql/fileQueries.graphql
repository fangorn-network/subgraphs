
query GetFileByFileFieldId($id: ID) {
	fileFields (where: {id: $id}) {
		...FileByFileField
	}
}

query GetFileByFileId($id: ID) {
	files (where: {id: $id}) {
		...File
	}
}

query GetFilesByFileFieldNameValuePair($name: String, $value: String, $first: Int = 100, $skip: Int = 0) {
	fileFields (where: {name: $name, value: $value}, first: $first, skip: $skip) {
		...FileByFileField
	}
}

query GetFilesByFileFieldNameValuePairNoCase($name: String, $value: String, $first: Int = 100, $skip: Int = 0) {
	fileFields (where: {name: $name, value_contains_nocase: $value}, first: $first, skip: $skip) {
		...FileByFileField
	}
}

query GetFilesByFileFieldValue($value: String, $first: Int = 100, $skip: Int = 0) {
	fileFields (where: {value: $value}, first: $first, skip: $skip) {
		...FileByFileField
	}
}

query GetFilesByFileFieldValueNoCase($value: String, $first: Int = 100, $skip: Int = 0) {
	fileFields (where: {value_contains_nocase: $value}, first: $first, skip: $skip) {
		...FileByFileField
	}
}

query GetFilesByFileFieldName($name: String, $first: Int = 100, $skip: Int = 0) {
		fileFields (where: {name: $name,}, first: $first, skip: $skip) {
		...FileByFileField
	}
}

query GetFileEntriesByManifestStatetId($manifestStateId: Bytes, $first: Int = 100, $skip: Int = 0) {
	files (where: {manifestStateId: $manifestStateId}, first: $first, skip: $skip) {
		...File
	}
}

query GetPriceByFileFieldId($id: ID) {
	fileFields (where: {id: $id}) {
		pricing{
			...PricingResource
		}
	}
}

query GetFileFieldValuesByFileFieldName($name: String) {
	fileFields(where: {name: $name}) {
		...FileFieldValue
	}
}